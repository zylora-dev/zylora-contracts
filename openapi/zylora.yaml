          type: string
          enum: [runpod_serverless, runpod_pods, vastai, gcp_spot, lambda, coreweave]
        function_id:
          type: string
          format: uuid
        deployment_id:
          type: string
          format: uuid
        gpu_type:
          $ref: "#/components/schemas/GpuTypeEnum"
        gpu_count:
          type: integer
          default: 1
        status:
          $ref: "#/components/schemas/InstanceStatusEnum"
        region:
          type: [string, "null"]
        cost_per_second_cents:
          type: [number, "null"]
          description: Cost per second in fractional cents
        started_at:
          type: string
          format: date-time
        ready_at:
          type: [string, "null"]
          format: date-time
        last_invocation_at:
          type: [string, "null"]
          format: date-time
        idle_since:
          type: [string, "null"]
          format: date-time

    NotificationChannel:
      type: object
      required: [id, channel_type, name, enabled, verified, events, created_at]
      properties:
        id:
          type: string
          format: uuid
        channel_type:
          $ref: "#/components/schemas/NotificationChannelTypeEnum"
        name:
          type: string
        enabled:
          type: boolean
        verified:
          type: boolean
        events:
          type: array
          items:
            type: string
          description: Subscribed event types
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateNotificationChannelRequest:
      type: object
      required: [name, channel_type, config]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        channel_type:
          $ref: "#/components/schemas/NotificationChannelTypeEnum"
        config:
          type: object
          description: |
            Channel-specific config:
            - **slack/discord/webhook**: `{ "webhook_url": "https://..." }`
            - **email**: `{ "email": "user@example.com" }`
          additionalProperties: true
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventEnum"
          default: []

    UpdateNotificationChannelRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        config:
          type: object
          additionalProperties: true
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventEnum"
        enabled:
          type: boolean

    Webhook:
      type: object
      required: [id, url, events, enabled, failure_count, created_at]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventEnum"
        enabled:
          type: boolean
        failure_count:
          type: integer
        last_triggered_at:
          type: [string, "null"]
          format: date-time
        last_success_at:
          type: [string, "null"]
          format: date-time
        last_failure_at:
          type: [string, "null"]
          format: date-time
        disabled_reason:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookCreatedResponse:
      allOf:
        - $ref: "#/components/schemas/Webhook"
        - type: object
          required: [secret]
          properties:
