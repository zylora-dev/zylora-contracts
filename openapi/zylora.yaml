    UpdateFunctionRequest:
      type: object
      properties:
        description:
          type: string
          maxLength: 500
        gpu_type:
          $ref: "#/components/schemas/GpuTypeEnum"
        min_instances:
          type: integer
          minimum: 0
        max_instances:
          type: integer
          minimum: 1
        concurrency:
          type: integer
          minimum: 1
        timeout_seconds:
          type: integer
          minimum: 1
          maximum: 3600
        schedule:
          type: [string, "null"]
        schedule_enabled:
          type: boolean
        environment:
          type: object
          additionalProperties:
            type: string
        visibility:
          $ref: "#/components/schemas/VisibilityEnum"

    Deployment:
      type: object
      required:
        - id
        - function_id
        - version
        - status
        - config_snapshot
        - traffic_percentage
        - queued_at
        - created_at
      properties:
        id:
          type: string
          format: uuid
        function_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        version:
          type: integer
          description: Monotonically increasing version number
        status:
          $ref: "#/components/schemas/DeploymentStatusEnum"
        container_image:
          type: [string, "null"]
          example: "ghcr.io/zylora-dev/fn-abc123:v5"
        image_digest:
          type: [string, "null"]
          description: SHA-256 image digest
        image_size_bytes:
          type: [integer, "null"]
          format: int64
        build_log_url:
          type: [string, "null"]
          format: uri
        build_duration_ms:
          type: [integer, "null"]
          format: int64
        source_hash:
          type: [string, "null"]
        git_ref:
          type: [string, "null"]
        git_branch:
          type: [string, "null"]
        config_snapshot:
          type: object
          description: Immutable snapshot of function config at deploy time
        traffic_percentage:
          type: integer
          minimum: 0
          maximum: 100
        queued_at:
          type: string
          format: date-time
        build_started_at:
          type: [string, "null"]
          format: date-time
        build_completed_at:
          type: [string, "null"]
          format: date-time
        deployed_at:
          type: [string, "null"]
          format: date-time
        failure_reason:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time

    DeployRequest:
      type: object
      properties:
        git_ref:
          type: string
          description: Commit SHA to deploy
        git_branch:
          type: string
          description: Branch name
        traffic_percentage:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
          description: Initial traffic percentage (use /promote to change after deploy)

    BuildLogs:
      type: object
      required: [deployment_id, lines]
      properties:
        deployment_id:
          type: string
          format: uuid
        lines:
          type: array
          items:
            type: object
            required: [timestamp, level, message]
            properties:
              timestamp:
                type: string
                format: date-time
              level:
                type: string
                enum: [info, warn, error]
              message:
                type: string

    Invocation:
      type: object
      required:
        - id
        - function_id
        - deployment_id
        - status
        - gpu_type
        - created_at
      properties:
        id:
          type: string
          format: uuid
        function_id:
          type: string
          format: uuid
        deployment_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/InvocationStatusEnum"
        gpu_type:
          $ref: "#/components/schemas/GpuTypeEnum"
        duration_ms:
          type: [integer, "null"]
          format: int64
        gpu_seconds:
          type: [number, "null"]
          description: Fractional GPU-seconds consumed
        cold_start:
          type: boolean
        cold_start_ms:
          type: [integer, "null"]
        cost_cents:
          type: [integer, "null"]
          format: int64
          description: Cost in integer cents
        input_size_bytes:
          type: [integer, "null"]
          format: int64
        output_size_bytes:
          type: [integer, "null"]
          format: int64
        is_streaming:
          type: boolean
        error_code:
          type: [string, "null"]
        error_message:
          type: [string, "null"]
        request_id:
          type: [string, "null"]
          format: uuid
        created_at:
          type: string
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time

    AsyncJobResponse:
      type: object
      required: [job_id, status, created_at]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/InvocationStatusEnum"
        created_at:
          type: string
          format: date-time

    AsyncJobResult:
      type: object
      required: [job_id, status, created_at]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/InvocationStatusEnum"
        result:
          type: [object, "null"]
          additionalProperties: true
          description: Present only when status is `completed`
        error:
          type: [object, "null"]
          properties:
            code:
              type: string
            message:
              type: string
          description: Present only when status is `failed` or `timeout`
        duration_ms:
          type: [integer, "null"]
        cost_cents:
          type: [integer, "null"]
          format: int64
        created_at:
          type: string
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time

    MapRequest:
      type: object
      required: [inputs]
      properties:
        inputs:
          type: array
          items:
            type: object
            additionalProperties: true
          minItems: 1
          maxItems: 1000
          description: Array of input payloads (each is passed to the function handler)
        concurrency:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
          description: Maximum concurrent invocations

    MapResponse:
      type: object
      required: [results, total, succeeded, failed]
      properties:
        results:
          type: array
          items:
            type: object
            required: [index, status]
            properties:
              index:
                type: integer
                description: Corresponds to the input array index
              status:
                type: string
                enum: [completed, failed, timeout]
              result:
                type: [object, "null"]
                additionalProperties: true
              error:
                type: [string, "null"]
        total:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer

    FunctionMetrics:
      type: object
      required: [function_id, from, to, granularity, buckets]
      properties:
        function_id:
          type: string
          format: uuid
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        granularity:
          type: string
          enum: [minute, hour, day]
        buckets:
          type: array
          items:
            type: object
            required: [timestamp, invocations, errors, p50_ms, p95_ms, p99_ms, total_cost_cents]
            properties:
              timestamp:
                type: string
                format: date-time
              invocations:
                type: integer
              errors:
                type: integer
              p50_ms:
                type: number
              p95_ms:
                type: number
              p99_ms:
                type: number
              cold_starts:
                type: integer
              total_cost_cents:
                type: integer
                format: int64

    Model:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        org_id:
          type: [string, "null"]
          format: uuid
        name:
          type: string
        description:
          type: [string, "null"]
        framework:
          $ref: "#/components/schemas/MlFrameworkEnum"
        task:
          type: [string, "null"]
          example: "text-generation"
        source:
          type: [string, "null"]
          example: "huggingface"
        base_model_id:
          type: [string, "null"]
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: [string, "null"]
          format: date-time

    CreateModelRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[a-z0-9][a-z0-9._-]{0,98}[a-z0-9]$"
        description:
          type: string
          maxLength: 500
        framework:
          $ref: "#/components/schemas/MlFrameworkEnum"
        task:
          type: string
          maxLength: 100
        source:
          type: string
          maxLength: 200
        org_id:
          type: string
          format: uuid

    ModelVersion:
      type: object
      required: [id, model_id, version, storage_path, sha256, size_bytes, created_at]
      properties:
        id:
          type: string
          format: uuid
        model_id:
          type: string
          format: uuid
        version:
          type: integer
        storage_path:
          type: string
          description: R2 object path
        sha256:
          type: string
        size_bytes:
          type: integer
          format: int64
        vram_required_mb:
          type: [integer, "null"]
        format:
          $ref: "#/components/schemas/ModelFormatEnum"
        source_url:
          type: [string, "null"]
        source_commit:
          type: [string, "null"]
        traffic_percentage:
          type: integer
          minimum: 0
          maximum: 100
          description: Current traffic percentage for this version
        created_at:
          type: string
          format: date-time

    CreateModelVersionRequest:
      type: object
      required: [size_bytes, sha256]
      properties:
        format:
          $ref: "#/components/schemas/ModelFormatEnum"
        size_bytes:
          type: integer
          format: int64
          minimum: 1
        sha256:
          type: string
          pattern: "^[a-f0-9]{64}$"
          description: SHA-256 hex digest of the file
        vram_required_mb:
          type: integer
          minimum: 0
        source_url:
          type: string
          maxLength: 500

    ModelVersionUploadResponse:
      allOf:
        - $ref: "#/components/schemas/ModelVersion"
        - type: object
          required: [upload_url, upload_expires_at]
          properties:
            upload_url:
              type: string
              format: uri
              description: Presigned R2 upload URL — PUT your file here
            upload_expires_at:
              type: string
              format: date-time
              description: URL expires after 2 hours

    CreditBalance:
      type: object
      required:
        - balance_cents
        - lifetime_credits_cents
        - lifetime_usage_cents
        - free_credits_cents
      properties:
        balance_cents:
          type: integer
          format: int64
          description: Current balance in integer cents
          example: 4750
        lifetime_credits_cents:
          type: integer
          format: int64
          description: Total credits ever granted or purchased
        lifetime_usage_cents:
          type: integer
          format: int64
          description: Total credits ever consumed
        free_credits_cents:
          type: integer
          format: int64
          description: Monthly free credits included with plan
        free_credits_reset_at:
          type: [string, "null"]
          format: date-time
        auto_recharge:
          type: boolean
          description: Whether auto-recharge is enabled
        auto_recharge_threshold_cents:
          type: [integer, "null"]
          format: int64
          description: Balance threshold that triggers auto-recharge
        auto_recharge_amount_cents:
          type: [integer, "null"]
          format: int64
          description: Amount to top up when threshold is hit
        monthly_cap_cents:
          type: [integer, "null"]
          format: int64
          description: Hard monthly spending cap (null = no cap)
        current_month_usage_cents:
          type: integer
          format: int64
          description: Usage so far this month

    UsageSummary:
      type: object
      required: [from, to, total_cost_cents, buckets]
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        total_cost_cents:
          type: integer
          format: int64
        total_invocations:
          type: integer
        total_gpu_seconds:
          type: number
        buckets:
          type: array
          items:
            type: object
            required: [date, cost_cents, invocations]
            properties:
              date:
                type: string
                format: date-time
              cost_cents:
                type: integer
                format: int64
              invocations:
                type: integer
              gpu_seconds:
                type: number

    UsageEvent:
      type: object
      required: [id, event_type, quantity, unit, unit_cost_cents, total_cost_cents, created_at]
      properties:
        id:
          type: string
          format: uuid
        invocation_id:
          type: [string, "null"]
          format: uuid
        event_type:
          $ref: "#/components/schemas/UsageEventTypeEnum"
        gpu_type:
          $ref: "#/components/schemas/GpuTypeEnum"
        quantity:
          type: number
          description: Quantity consumed (GPU-seconds, GB, minutes, etc.)
        unit:
          type: string
          description: Unit of measurement (e.g. 'gpu_seconds', 'gb_months')
        unit_cost_cents:
          type: number
          description: Cost per unit (may be fractional)
        total_cost_cents:
          type: integer
          format: int64
          description: Total cost in integer cents
        created_at:
          type: string
          format: date-time

    PlanDetails:
      type: object
      required: [tier, status, price_cents, currency, current_period_start, current_period_end]
      properties:
        tier:
          $ref: "#/components/schemas/TierEnum"
        status:
          type: string
          enum: [active, trialing, past_due, cancelled, expired, paused, incomplete]
        price_cents:
          type: integer
          format: int64
          description: Monthly/yearly price in integer cents
        currency:
          type: string
          example: usd
        billing_interval:
          type: string
          enum: [month, year]
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancel_at_period_end:
          type: boolean
        trial_end:
          type: [string, "null"]
          format: date-time
        credits_included_cents:
          type: integer
          format: int64
          description: Monthly credits included with this plan

    Secret:
      type: object
      required: [id, name, version, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "OPENAI_API_KEY"
        function_id:
          type: [string, "null"]
          format: uuid
          description: null = user/org-wide secret
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSecretRequest:
      type: object
      required: [name, value]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          pattern: "^[A-Z][A-Z0-9_]*$"
          description: "UPPER_SNAKE_CASE name (e.g. DATABASE_URL)"
        value:
          type: string
          minLength: 1
          maxLength: 65536
          description: Secret value — encrypted before storage, never returned
        function_id:
          type: [string, "null"]
          format: uuid
          description: Scope to a specific function (null = user/org-wide)

    Instance:
      type: object
      required: [id, provider, function_id, deployment_id, gpu_type, status, started_at]
      properties:
        id:
          type: string
          format: uuid
