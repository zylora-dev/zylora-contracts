                type: string
                format: uuid
              function_name:
                type: string
              gpu_hours:
                type: number
              cost_cents:
                type: integer
                format: int64
              pct:
                type: number
                description: Percentage of total spend

    # ── Startup Schemas ──────────────────────────────────────────────────────

    StartupApplicationRequest:
      type: object
      required: [tier]
      properties:
        tier:
          type: string
          enum: [explorer, builder, startup, accelerator]
        company_name:
          type: string
        company_url:
          type: string
        github_url:
          type: string
        linkedin_url:
          type: string
        funding_stage:
          type: string
        use_case:
          type: string

    StartupApplication:
      type: object
      required: [id, tier, status, credits_granted_cents, created_at]
      properties:
        id:
          type: string
          format: uuid
        tier:
          type: string
          enum: [explorer, builder, startup, accelerator]
        status:
          type: string
          enum: [pending, approved, rejected, expired]
        company_name:
          type: string
          nullable: true
        company_url:
          type: string
          nullable: true
        github_url:
          type: string
          nullable: true
        linkedin_url:
          type: string
          nullable: true
        funding_stage:
          type: string
          nullable: true
        use_case:
          type: string
          nullable: true
        credits_granted_cents:
          type: integer
          format: int64
        credits_expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Pagination Wrappers ───────────────────────────────────────────────────

    OffsetPagination:
      type: object
      required: [total, page, per_page, has_more]
      properties:
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        has_more:
          type: boolean

    CursorPagination:
      type: object
      required: [has_more]
      properties:
        has_more:
          type: boolean
        next_cursor:
          type: [string, "null"]
          format: uuid
          description: Pass as `cursor` in next request

    PaginatedApiKeys:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApiKey"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"

    PaginatedFunctions:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Function"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"

    PaginatedDeployments:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Deployment"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"

    PaginatedModels:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Model"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"

    PaginatedModelVersions:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ModelVersion"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"

    PaginatedInvocations:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Invocation"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    PaginatedUsageEvents:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UsageEvent"
        pagination:
          $ref: "#/components/schemas/CursorPagination"

    PaginatedSecrets:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Secret"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"

    PaginatedInstances:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Instance"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"

    PaginatedNotificationChannels:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/NotificationChannel"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"

    PaginatedWebhooks:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Webhook"
        pagination:
          $ref: "#/components/schemas/OffsetPagination"

    # ── Error ────────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: "function_not_found"
            message:
              type: string
              description: Human-readable error description
              example: "Function 'embed-text' does not exist."
            request_id:
              type: string
              format: uuid
              description: UUID v7 — include in support requests

  # ── Reusable Responses ──────────────────────────────────────────────────────

  responses:
    BadRequest:
      description: Bad request — malformed JSON or invalid parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: bad_request
              message: "Invalid request body."
              request_id: "01hw3abc-0000-7000-0000-000000000001"

    Unauthorized:
      description: Missing or invalid authentication credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: unauthorized
              message: "Authentication required."
              request_id: "01hw3abc-0000-7000-0000-000000000002"

    PaymentRequired:
      description: Insufficient credits to complete the request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: insufficient_credits
              message: "Your credit balance is too low. Please top up to continue."
              request_id: "01hw3abc-0000-7000-0000-000000000003"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: not_found
              message: "Resource does not exist."
              request_id: "01hw3abc-0000-7000-0000-000000000004"

    Conflict:
      description: Conflict with current resource state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: conflict
              message: "A resource with this name already exists."
              request_id: "01hw3abc-0000-7000-0000-000000000005"

    UnprocessableEntity:
      description: Validation error — request body is syntactically valid but semantically incorrect
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: validation_error
              message: "name: must match pattern '^[a-z0-9][a-z0-9-]{0,98}[a-z0-9]$'"
              request_id: "01hw3abc-0000-7000-0000-000000000006"

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/X-RateLimit-Limit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/X-RateLimit-Remaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/X-RateLimit-Reset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: rate_limit_exceeded
              message: "Rate limit exceeded. Retry after X-RateLimit-Reset."
              request_id: "01hw3abc-0000-7000-0000-000000000007"

    Timeout:
      description: Function execution timed out
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: function_timeout
              message: "Function exceeded the maximum execution time."
              request_id: "01hw3abc-0000-7000-0000-000000000008"

    FunctionError:
      description: Function returned an unhandled exception
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: function_error
              message: "Function raised an unhandled exception."
              request_id: "01hw3abc-0000-7000-0000-000000000009"

    ServiceUnavailable:
      description: No GPU instances available — all providers at capacity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: no_capacity
              message: "No GPU capacity available. Please retry shortly."
              request_id: "01hw3abc-0000-7000-0000-000000000010"

# ─────────────────────────────────────────────────────────────────────────────
# WEBHOOK PAYLOADS (informational — not part of the request/response cycle)
# These schemas describe the POST body Zylora sends to user webhook endpoints.
# ─────────────────────────────────────────────────────────────────────────────

x-webhook-payloads:
  description: |
    All webhook deliveries share this envelope:
    ```json
    {
      "event": "deployment.active",
      "timestamp": "2026-04-10T14:30:00Z",
      "delivery_id": "01hw3abc-...",
      "data": { ... event-specific payload ... }
    }
    ```
    Verify authenticity by checking `X-Zylora-Signature`:
    ```
    HMAC-SHA256(secret, raw_request_body) == X-Zylora-Signature
    ```
  schemas:
    deployment.queued: &deployment_event
      event:
        type: string
        example: "deployment.queued"
      timestamp:
        type: string
        format: date-time
      delivery_id:
        type: string
        format: uuid
      data:
        $ref: "#/components/schemas/Deployment"
    deployment.building: *deployment_event
    deployment.active: *deployment_event
    deployment.failed: *deployment_event
    invocation.completed:
      event:
        type: string
        example: "invocation.completed"
      timestamp:
        type: string
        format: date-time
      delivery_id:
        type: string
        format: uuid
      data:
        $ref: "#/components/schemas/Invocation"
    credits.low:
      event:
        type: string
        example: "credits.low"
      timestamp:
        type: string
        format: date-time
      delivery_id:
        type: string
        format: uuid
      data:
        balance_cents:
          type: integer
          format: int64
        threshold_cents:
          type: integer
          format: int64
