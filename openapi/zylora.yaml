              type: string
              description: |
                HMAC signing secret — shown ONCE, store securely.
                Use it to verify `X-Zylora-Signature` on incoming deliveries.

    CreateWebhookRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
          description: HTTPS endpoint that will receive POST requests (no private IPs)
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventEnum"
          minItems: 1

    UpdateWebhookRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventEnum"
          minItems: 1
        enabled:
          type: boolean

